name: Auto update data
on:
  schedule:
    - cron: '50 8 * * 1-5'   # 15:50 gio VN, thu 2 - thu 6
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cap nhat du lieu 702 ma
        run: node scripts/update_data.js
      - name: Commit neu co thay doi
        run: |
          git config user.name "kafi-data-bot"
          git config user.email "kafi-bot@users.noreply.github.com"
          git add dashboard_data.js
          git diff --cached --quiet || git commit -m "Auto data update $(TZ=Asia/Ho_Chi_Minh date +'%Y-%m-%d %H:%M')"
          git push
