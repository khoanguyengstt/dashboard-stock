<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Khoa KAFI — CANSLIM Dashboard</title>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f7f9fb;--panel:#ffffff;--panel2:#f3f5f7;--border:#e4e8ec;--text:#1f2937;--muted:#6b7280;--green:#18a34b;--green-dark:#128a3e;--green-soft:#e7f6ec;--red:#e5484d;--blue:#18a34b;--amber:#d97706;--purple:#8b5cf6}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
.wrap{max-width:1400px;margin:0 auto;padding:12px}
header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:10px 0}
header h1{font-size:20px;color:var(--green-dark);display:flex;align-items:center;gap:10px}
.logo-mark{display:inline-flex;width:34px;height:34px;border-radius:8px;background:var(--green);color:#fff;font-weight:800;font-size:17px;align-items:center;justify-content:center}
header h1 .sub{font-weight:400;color:var(--muted);font-size:14px}
.badge{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:3px 12px;font-size:12px;color:var(--muted)}
.btn{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px}
.btn:hover{border-color:var(--green)}
.btn.primary,.btn.active{background:var(--green);border-color:var(--green);color:#fff}
nav{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
.card h2{font-size:15px;margin-bottom:10px;color:var(--green-dark)}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:13px}
th{position:sticky;top:0;background:var(--green);color:#fff;text-align:right;padding:8px;cursor:pointer;white-space:nowrap;user-select:none}
th:first-child,td:first-child{text-align:left}
th.on{background:var(--green-dark)}
td{padding:6px 8px;border-top:1px solid var(--border);text-align:right;white-space:nowrap}
tr.row:hover{background:var(--green-soft);cursor:pointer}
.up{color:var(--green-dark)}.down{color:var(--red)}.mut{color:var(--muted)}
input,select{background:#fff;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 8px;font-size:13px}
input:focus,select:focus{outline:2px solid var(--green-soft);border-color:var(--green)}
input[type=number]{width:78px}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
.filters label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
.tag{display:inline-block;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600}
.cs-letter{display:inline-flex;width:30px;height:30px;border-radius:8px;align-items:center;justify-content:center;font-weight:700;margin-right:5px;border:1px solid var(--border)}
.cs-on{background:var(--green-soft);color:var(--green-dark);border-color:var(--green)}
.cs-off{background:var(--panel2);color:var(--muted)}
.kpis{display:flex;gap:10px;flex-wrap:wrap}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:9px 14px;min-width:110px}
.kpi .l{font-size:11px;color:var(--muted)}.kpi .v{font-size:17px;font-weight:700;margin-top:2px;color:var(--green-dark)}
#chartMain{height:420px}#chartRsi,#chartMacd{height:110px}
.mini{font-size:12px;color:var(--muted)}
.search-wrap{position:relative}
#sugg{position:absolute;top:36px;left:0;background:#fff;border:1px solid var(--border);border-radius:8px;z-index:50;max-height:280px;overflow:auto;min-width:280px;display:none;box-shadow:0 8px 24px rgba(16,24,40,.12)}
#sugg div{padding:7px 10px;cursor:pointer}#sugg div:hover{background:var(--green-soft)}
.pill{cursor:pointer;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px}
.pill.on{background:var(--green);border-color:var(--green);color:#fff}
#toast{position:fixed;bottom:18px;right:18px;background:var(--green);color:#fff;padding:10px 18px;border-radius:8px;display:none;z-index:99;box-shadow:0 8px 24px rgba(16,24,40,.2)}
.cmp-chip{background:var(--green-soft);border:1px solid var(--green);border-radius:20px;padding:4px 12px;margin-right:6px;display:inline-block;color:var(--green-dark)}
.cmp-chip span{cursor:pointer;color:var(--red);margin-left:6px}
footer{color:var(--muted);font-size:12px;padding:16px 0;text-align:center}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp 0.8s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="logo-mark">K</span>Khoa KAFI <span class="sub">CANSLIM Dashboard</span></h1>
    <span class="badge" id="bgeData">Dữ liệu: …</span>
    <span class="badge">702 mã HOSE + HNX</span>
    <button class="btn" id="btnRefresh" title="Tải lại toàn bộ dữ liệu screener từ API (khoảng 1-2 phút)">Cập nhật dữ liệu</button>
    <span id="refreshStatus" class="mini"></span>
  </header>
  <nav>
    <button class="btn active" data-view="market">Thị trường</button>
    <button class="btn" data-view="screener">Bộ lọc cổ phiếu</button>
    <button class="btn" data-view="detail">Chi tiết mã</button>
    <button class="btn" data-view="compare">So sánh</button>
  </nav>
  <div id="view-market"></div>
  <div id="view-screener" style="display:none"></div>
  <div id="view-detail" style="display:none"></div>
  <div id="view-compare" style="display:none"></div>
  <footer>Nguồn dữ liệu: VNDirect (giá) &amp; Vietcap IQ (BCTC, tỉ lệ) — giá đơn vị nghìn đồng, đã điều chỉnh. Dashboard chỉ mang tính tham khảo, không phải khuyến nghị đầu tư.</footer>
</div>
<div id="toast"></div>
<script src="dashboard_data.js?v=20260704c"></script>
<script src="dashboard_app.js?v=20260705c"></script>
</body>
</html>
